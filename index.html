<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital ID Card HIMIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl flex flex-col justify-between">
        <div>
            <!-- HEADER -->
            <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-6 rounded-b-3xl shadow-lg text-center">
                <div class="w-24 h-24 mx-auto mb-3 rounded-full border-4 border-white/20 flex items-center justify-center bg-white text-blue-700 text-3xl font-bold">H</div>
                <h1 class="text-xl font-bold tracking-wide">HIMIP DIGITAL ID</h1>
                <p class="text-xs text-blue-200">Himpunan Mahasiswa Ilmu Pemerintahan</p>
            </header>

            <!-- PENCARIAN -->
            <div class="p-4 -mt-6">
                <div class="bg-white rounded-xl shadow-md p-2 flex items-center border border-gray-100">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 ml-3 mr-2"></i>
                    <input type="text" id="searchInput" placeholder="Cari Nama atau NIM..." class="w-full bg-transparent focus:outline-none text-sm p-2">
                </div>
            </div>

            <!-- KONTEN -->
            <main class="p-4">
                <div id="welcomeMessage" class="text-center py-12 text-gray-400">
                    <i class="fa-solid fa-id-card text-5xl mb-3 text-blue-200"></i>
                    <p class="text-sm px-6">Silakan ketik Nama/NIM pada kolom pencarian.</p>
                </div>

                <div id="idCard" class="hidden bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 rounded-2xl p-6 shadow-inner text-center">
                    <div class="w-32 h-32 mx-auto rounded-full bg-gradient-to-tr from-blue-600 to-indigo-700 text-white flex items-center justify-center text-4xl font-bold shadow-md mb-4 border-4 border-white" id="userAvatar">
                        <!-- Inisial Huruf Jika Foto Kosong -->
                    </div>
                    <h2 id="userNama" class="text-xl font-bold text-gray-800"></h2>
                    <p id="userNIM" class="text-sm text-gray-500 font-mono mb-1"></p>
                    <span id="userJabatan" class="inline-block bg-blue-600 text-white text-xs px-3 py-1 rounded-full font-semibold mb-6"></span>
                    
                    <div id="containerWA">
                        <!-- Tombol WA otomatis muncul jika ada datanya -->
                    </div>
                </div>
                
                <div id="notFound" class="hidden text-center py-12 text-red-400">
                    <i class="fa-solid fa-circle-xmark text-4xl mb-2"></i>
                    <p class="text-sm font-semibold">Anggota tidak ditemukan.</p>
                </div>
            </main>
        </div>

        <footer class="text-center py-4 text-xs text-gray-400 border-t border-gray-100 bg-gray-50">
            &copy; 2026 HIMIP Dev Team.
        </footer>
    </div>

    <script>
        // Menggunakan link publikasi dari Google Sheets kamu yang baru
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThmlNzi3hFzEssyegx3_V8VAUN_9NkeKrgITF0kDoWWVuNqNAB8PrrnVfAKtcaKH1ocMYctTMdP2Rs/pub?gid=916888990&single=true&output=csv'; 
        
        let dataAnggota = [];

        function loadData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    // Penyesuaian nama kolom otomatis (mengubah semua kolom ke huruf kecil & hapus spasi)
                    dataAnggota = results.data.map(row => {
                        let newRow = {};
                        for (let key in row) {
                            if(key) {
                                newRow[key.toLowerCase().trim()] = row[key];
                            }
                        }
                        return newRow;
                    });
                    cekParameterURL();
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            if(keyword === "") { showWelcome(); return; }

            // Cari berdasarkan kolom 'nama' atau 'nim' yang ada di Sheets kamu
            const hasil = dataAnggota.find(a => 
                (a.nama && a.nama.toLowerCase().includes(keyword)) || 
                (a.nim && a.nim.toLowerCase().includes(keyword))
            );

            if(hasil) { tampilkanBiodata(hasil); } else { showNotFound(); }
        });

        function tampilkanBiodata(a) {
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('notFound').classList.add('hidden');
            document.getElementById('idCard').classList.remove('hidden');

            const namaTertera = a.nama || "Tanpa Nama";
            document.getElementById('userNama').innerText = namaTertera;
            document.getElementById('userNIM').innerText = "NIM: " + (a.nim || "-");
            
            // Menggunakan kolom 'prodi' yang ada di Google Sheets kamu
            document.getElementById('userJabatan').innerText = a.prodi || "Ilmu Pemerintahan";
            
            // Membuat inisial huruf besar sebagai pengganti foto
            document.getElementById('userAvatar').innerText = namaTertera.charAt(0).toUpperCase();
            
            // Cek jika ada kolom whatsapp/kontak
            const containerWA = document.getElementById('containerWA');
            let kolomWA = a.whatsapp || a.no_hp || a.kontak || "";
            if(kolomWA) {
                if(kolomWA.startsWith('0')) { kolomWA = '62' + kolomWA.slice(1); }
                containerWA.innerHTML = `
                    <a href="https://wa.me/${kolomWA.replace(/[^0-9]/g, '')}" target="_blank" class="flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition w-full">
                        <i class="fa-brands fa-whatsapp text-xl"></i> Hubungi via WhatsApp
                    </a>`;
            } else {
                containerWA.innerHTML = '';
            }
        }

        function showWelcome() {
            document.getElementById('welcomeMessage').classList.remove('hidden');
            document.getElementById('idCard').classList.add('hidden');
            document.getElementById('notFound').classList.add('hidden');
        }

        function cekParameterURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const nimParam = urlParams.get('nim');
            if(nimParam) {
                const hasil = dataAnggota.find(a => a.nim && a.nim.trim() === nimParam.trim());
                if(hasil) {
                    tampilkanBiodata(hasil);
                    document.getElementById('searchInput').value = nimParam;
                }
            }
        }

        function showNotFound() {
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('idCard').classList.add('hidden');
            document.getElementById('notFound').classList.remove('hidden');
        }

        window.onload = loadData;
    </script>
</body>
</html>

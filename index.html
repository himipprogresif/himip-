<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database HIMIP</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

<div class="hero">

<h1>HIMPUNAN MAHASISWA ILMU PEMERINTAHAN</h1>

<p>DATABASE DIGITAL PENGURUS HIMIP</p>

<input
type="text"
id="search"
placeholder="Cari Nama, NIM atau Jabatan..."
>

</div>

</header>

<section id="anggota"></section>

<div id="detail" class="hidden">

<div class="card">

<button class="back" onclick="kembali()">

← Kembali

</button>

<h2 id="nama"></h2>

<div class="item">

<label>NIM</label>

<p id="nim"></p>

</div>

<div class="item">

<label>Program Studi</label>

<p>Ilmu Pemerintahan</p>

</div>

<div class="item">

<label>Angkatan</label>

<p id="angkatan"></p>

</div>

<div class="item">

<label>Jabatan</label>

<p id="jabatan"></p>

</div>

<div class="item">

<label>WhatsApp</label>

<p id="wa"></p>

</div>

<a id="chatwa" target="_blank">

<button class="wa">

Hubungi WhatsApp

</button>

</a>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
